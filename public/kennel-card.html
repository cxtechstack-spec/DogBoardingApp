<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kennel Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 24px;
    }

    .toolbar {
      max-width: 700px;
      margin: 0 auto 16px;
      display: flex;
      justify-content: flex-end;
    }

    button {
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #4338ca; }

    .card {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 32px;
    }

    .dog-name {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
    }

    .sub-line {
      font-size: 18px;
      color: #555;
      margin-top: 4px;
      margin-bottom: 20px;
    }

    .behavioral-alert {
      background: #fef2f2;
      border: 2px solid #dc2626;
      color: #991b1b;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid #eee;
    }

    .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #888;
      margin-bottom: 6px;
    }

    .section-value {
      font-size: 20px;
      white-space: pre-wrap;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .empty { color: #aaa; font-style: italic; }
    .loading, .error-text { max-width: 700px; margin: 40px auto; text-align: center; color: #888; }

    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .card { border: none; border-radius: 0; padding: 0; max-width: none; }
    }
  </style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.print()">Print</button>
</div>

<div id="content">
  <p class="loading">Loading…</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const locationId = params.get('location_id') || params.get('locationId');
  const bookingId = params.get('bookingId');
  const API = (path) => `${path}${path.includes('?') ? '&' : '?'}location_id=${encodeURIComponent(locationId)}`;

  const SERVICE_LABELS = { BOARDING: 'Boarding', DAY_CARE: 'Day Care', DAY_TRAINING: 'Board and Train' };

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
  }

  function fieldSection(label, value) {
    return `
      <div class="section">
        <div class="section-label">${label}</div>
        <div class="section-value">${value ? value : '<span class="empty">None on file</span>'}</div>
      </div>
    `;
  }

  async function load() {
    const content = document.getElementById('content');
    if (!locationId || !bookingId) {
      content.innerHTML = '<p class="error-text">Missing location or booking information.</p>';
      return;
    }

    const res = await fetch(API(`/api/bookings/${bookingId}`));
    if (!res.ok) {
      const { error } = await res.json().catch(() => ({}));
      content.innerHTML = `<p class="error-text">${error || 'Could not load this booking.'}</p>`;
      return;
    }
    const { booking } = await res.json();
    const dog = booking.dog || {};
    const owner = booking.owner || {};
    const start = booking.actualStartDate || booking.startDate;
    const end = booking.actualEndDate || booking.endDate;

    document.title = `Kennel Card — ${dog.name || 'Dog'}`;

    content.innerHTML = `
      <div class="card">
        <div class="dog-name">${dog.name || 'Unnamed dog'}${dog.breed ? ` — ${dog.breed}` : ''}</div>
        <div class="sub-line">${booking.unit?.name || 'No unit assigned'} · ${SERVICE_LABELS[booking.serviceType] || booking.serviceType} · ${formatDate(start)} – ${formatDate(end)}</div>

        ${dog.behavioral ? `<div class="behavioral-alert">⚠️ Behavioral Notes: ${dog.behavioral}</div>` : ''}

        <div class="grid-2">
          ${fieldSection('Feeding Instructions', dog.feeding)}
          ${fieldSection('Medications', dog.meds)}
        </div>
        ${fieldSection('Notes', dog.notes)}
        ${fieldSection('Owner', owner.name ? `${owner.name}${owner.phone ? ' · ' + owner.phone : ''}` : null)}
      </div>
    `;
  }

  load();
</script>
</body>
</html>
